name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux, campusloop-prod]
    steps:
      - name: Pull latest frontend
        working-directory: /opt/campusloop/campusloop-frontend
        run: git pull origin main

      - name: Build and start frontend
        working-directory: /opt/campusloop/campusloop-backend
        run: |
          set -e
          COMPOSE="docker compose -f compose.prod.yaml --env-file compose.prod.env"

          # Frontend-only deploy: do not recreate backend (avoids stale container errors)
          $COMPOSE stop frontend 2>/dev/null || true
          $COMPOSE rm -f frontend 2>/dev/null || true
          for name in $(docker ps -a --format '{{.Names}}' | grep -E 'campusloop-prod.*frontend' || true); do
            docker rm -f "$name" || true
          done

          $COMPOSE up -d --build --no-deps --force-recreate frontend
